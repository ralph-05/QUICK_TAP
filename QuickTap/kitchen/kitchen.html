<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Dashboard</title>
    <link rel="stylesheet" href="../global-styles.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-init.js"></script>
    <script src="../staff-auth.js"></script>
    <script>
      (function() {
        function check() {
          if (typeof canAccessKitchen !== 'function') return setTimeout(check, 50);
          if (!canAccessKitchen() || !isStaffLoggedIn()) {
            location.href = '../home.html?error=' + encodeURIComponent('Please log in with kitchen access');
            return;
          }
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', check);
        else check();
      })();
    </script>
</head>
<body>
    <div style="display:flex; align-items:center; justify-content:flex-end; margin-bottom:8px;">
        <button onclick="staffLogout()" style="padding:8px 16px; background:transparent; border:1px solid var(--border-color); border-radius:6px; cursor:pointer; font-size:12px; color:var(--coffee-medium);">Logout</button>
    </div>
    <div class="kitchen-header">
        <div class="kitchen-header-row">
            <h1>Kitchen Dashboard</h1>
        </div>
        <div id="statusMessage"></div>
    </div>

    <div class="kitchen-board">
        <!-- Pending Column -->
        <div class="kitchen-column col-pending">
            <div class="column-header">
                <h3>Pending</h3>
                <span class="count-badge" id="count-pending">0</span>
            </div>
            <div class="column-content" id="col-pending">
                <!-- Orders will be injected here -->
            </div>
        </div>

        <!-- Preparing Column -->
        <div class="kitchen-column col-preparing">
            <div class="column-header">
                <h3>Preparing</h3>
                <span class="count-badge" id="count-preparing">0</span>
            </div>
            <div class="column-content" id="col-preparing">
                <!-- Orders will be injected here -->
            </div>
        </div>

        <!-- Ready Column -->
        <div class="kitchen-column col-ready">
            <div class="column-header">
                <h3>Ready</h3>
                <span class="count-badge" id="count-ready">0</span>
            </div>
            <div class="column-content" id="col-ready">
                <!-- Orders will be injected here -->
            </div>
        </div>
    </div>

    <script src="kitchen.js"></script>
</body>
</html>
